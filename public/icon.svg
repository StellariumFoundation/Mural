<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="50%" stop-color="#090d16" />
      <stop offset="100%" stop-color="#022c22" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="100%" height="100%" rx="120" fill="url(#bg)" />
  
  <!-- Subtle background glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)" />
  
  <!-- Constellation/Stellarium Star Grid in the background -->
  <g stroke="#1e293b" stroke-width="1.5" stroke-dasharray="2 3" opacity="0.6">
    <line x1="256" y1="40" x2="256" y2="472" />
    <line x1="40" y1="256" x2="472" y2="256" />
    <circle cx="256" cy="256" r="140" fill="none" />
    <line x1="100" y1="100" x2="412" y2="412" />
    <line x1="100" y1="412" x2="412" y2="100" />
  </g>
  
  <!-- Central Glowing Emerald Stella/Mural Core -->
  <g transform="translate(256, 256)">
    <!-- Glow Backing -->
    <circle cx="0" cy="0" r="45" fill="#10b981" opacity="0.4" filter="blur(8px)" />
    
    <!-- Large 4-point Diamond Star -->
    <path d="M 0,-130 Q 0,0 -130,0 Q 0,0 0,130 Q 0,0 130,0 Q 0,0 0,-130 Z" fill="#34d399" />
    
    <!-- Medium 4-point Diagonal Star -->
    <path d="M -50,-50 Q 0,0 -50,50 Q 0,0 50,50 Q 0,0 50,-50 Q 0,0 -50,-50 Z" fill="#047857" transform="rotate(45)" opacity="0.8" />
    
    <!-- Inner Core Pearl -->
    <circle cx="0" cy="0" r="14" fill="#ffffff" />
    <circle cx="0" cy="0" r="8" fill="#a7f3d0" />
  </g>
</svg>
